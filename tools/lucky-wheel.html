<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Wheel - PickTool</title>
    <!-- 3. CSS is only for all in assets folder -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <style>
        /* 4. Blue rounded shape of the main screen and tool-specific styles */
        body { background-color: #f0f4f9; display: flex; justify-content: center; padding: 20px; font-family: sans-serif; margin: 0; }
        .tool-container { background: white; border: 2px solid #3b5998; border-radius: 12px; padding: 25px 20px; width: 100%; max-width: 420px; text-align: center; box-sizing: border-box; }
        
        h2 { color: #3b5998; margin-top: 0; font-size: 26px; }
        
        /* 6. Simple rules */
        .rules { font-size: 14px; color: #555; margin-bottom: 20px; font-style: italic; }

        .wheel-wrapper { position: relative; width: 250px; height: 250px; margin: 0 auto 30px; }
        
        /* The Pointer at the top */
        .pointer { 
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 25px solid #d93838; 
            z-index: 10; 
        }
        
        /* The Wheel with 6 Portions */
        .wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 4px solid #3b5998; box-sizing: border-box;
            background: conic-gradient(
                #e0e5f2 0deg 60deg,
                #3b5998 60deg 120deg,
                #e0e5f2 120deg 180deg,
                #3b5998 180deg 240deg,
                #e0e5f2 240deg 300deg,
                #3b5998 300deg 360deg
            );
            position: relative;
            transition: transform 4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        
        .label {
            position: absolute; top: 50%; left: 50%; width: 80px; 
            margin-top: -10px; margin-left: -40px; text-align: center;
            font-size: 13px; font-weight: bold; line-height: 1.2;
        }

        .btn-main { background-color: #3b5998; color: white; border: none; border-radius: 8px; padding: 12px 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; width: 60%; }
        .btn-main:active { transform: scale(0.95); }
        .btn-main:disabled { background-color: #9aa9c4; cursor: not-allowed; }

        #result-text { margin-top: 20px; font-size: 18px; font-weight: bold; color: #d93838; display: none; }
        
        .retry-box { margin-top: 15px; display: none; }
        .retry-box p { font-weight: bold; color: #333; margin-bottom: 10px; }
        .retry-btn { padding: 8px 20px; margin: 0 5px; border-radius: 5px; font-weight: bold; cursor: pointer; border: 2px solid #3b5998; }
        .btn-yes { background-color: #3b5998; color: white; }
        .btn-no { background-color: white; color: #3b5998; }

        /* 5. Back button on the bottom */
        .back-link { display: inline-block; margin-top: 25px; color: #3b5998; font-weight: bold; text-decoration: none; }
        
        .ad-container { margin-top: 25px; text-align: center; }
    </style>
</head>
<body>

<div class="tool-container">
    <h2>Lucky Wheel</h2>
    
    <div class="rules">
        Tap "Spin" to test your luck!<br>
        Win data, minutes, or a cash prize!
    </div>

    <div class="wheel-wrapper">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <!-- Wheel Portions -->
            <div class="label" style="transform: rotate(30deg) translateY(-80px); color: #3b5998;">100 GB<br>Data</div>
            <div class="label" style="transform: rotate(90deg) translateY(-80px); color: white;">Bad Luck</div>
            <div class="label" style="transform: rotate(150deg) translateY(-80px); color: #3b5998;">100<br>Mins</div>
            <div class="label" style="transform: rotate(210deg) translateY(-80px); color: white;">Bad Luck</div>
            <div class="label" style="transform: rotate(270deg) translateY(-80px); color: #3b5998;">2500 Rs</div>
            <div class="label" style="transform: rotate(330deg) translateY(-80px); color: white;">Bad Luck</div>
        </div>
    </div>

    <button class="btn-main" id="spinBtn" onclick="spinWheel()">SPIN</button>
    
    <div id="result-text">Oh no! Bad Luck! 😞</div>
    
    <div class="retry-box" id="retry-box">
        <p>Try again?</p>
        <button class="retry-btn btn-yes" onclick="resetWheel()">Yes</button>
        <button class="retry-btn btn-no" onclick="window.location.href='../index.html'">Not</button>
    </div>

    <a href="../index.html" class="back-link">← Back to PickTool Home</a>

    <!-- Non-intrusive Ad Link -->
    <div class="ad-container">
        <script>
            atOptions = {
                'key' : 'be0e2dff2e618dbdd1d0dd94294cffc8',
                'format' : 'iframe',
                'height' : 50,
                'width' : 320,
                'params' : {}
            };
        </script>
        <script src="https://www.highperformanceformat.com/be0e2dff2e618dbdd1d0dd94294cffc8/invoke.js"></script>
    </div>
</div>

<!-- 2. JS file in assets folder -->
<script src="../assets/js/lucky-wheel.js"></script>
</body>
</html>
