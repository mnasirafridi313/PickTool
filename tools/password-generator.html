<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <div class="calculator-container">
        <h2>Password Generator</h2>
        
        <label>Length (6-26):</label>
        <input type="number" id="length" min="6" max="26" value="12">
        
        <label>Type:</label>
        <select id="type">
            <option value="digit">Pure Digit</option>
            <option value="alpha">Pure Alphabet</option>
            <option value="special">Pure Special Symbol</option>
            <option value="mixed">Mixed</option>
        </select>
        
        <button onclick="generatePasswords()" style="width:100%; margin-top:10px;">Generate</button>
        
        <div id="result" style="margin-top:20px; font-family: monospace; font-size: 1.2em;"></div>
        
        <br>
        <a href="../index.html">← Back to Home</a>
    </div>
    <script src="../assets/js/password-generator.js"></script>
</body>
</html>
