<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Converter</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7ff;
margin:0;
padding:20px;
}

.container{
max-width:450px;
margin:auto;
background:#fff;
padding:20px;
border:2px solid #4b67a8;
border-radius:20px;
}

h1{
text-align:center;
color:#3d5ca8;
}

label{
display:block;
margin-top:15px;
font-size:18px;
}

select,input,button{
width:100%;
padding:12px;
margin-top:6px;
font-size:17px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
background:#3d5ca8;
color:#fff;
border:none;
margin-top:20px;
cursor:pointer;
}

button:hover{
background:#304a8a;
}

#result{
margin-top:20px;
font-size:22px;
font-weight:bold;
text-align:center;
color:#2b4d9b;
}

.back{
display:block;
margin-top:25px;
text-align:center;
text-decoration:none;
font-size:20px;
color:#3d5ca8;
}
</style>

</head>

<body>

<div class="container">

<h1>Multi Converter</h1>

<label>Category</label>

<select id="category"></select>

<label>Amount</label>

<input type="number" id="amount" placeholder="Enter value">

<label>From</label>

<select id="from"></select>

<label>To</label>

<select id="to"></select>

<button onclick="convert()">Convert</button>

<div id="result"></div>

<a href="../index.html" class="back">← Back to PickTool Home</a>

</div>

<script src="tool-multi-converter.js"></script>

</body>
</html>
