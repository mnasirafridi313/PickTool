<!DOCTYPE html>
<html>
<body>
    <input type="text" id="title" placeholder="Table Title">
    <br><br>
    <button onclick="addCol()">+ Column</button>
    <button onclick="addRow()">+ Row</button>
    <br><br>
    <table id="tbl" border="1">
        <thead><tr id="head"><th>SN</th></tr></thead>
        <tbody id="body"></tbody>
    </table>
    <br>
    <div id="summary">
        <p>Total Items: <span id="count">0</span></p>
        <p>Grand Total (Results): <span id="grandTotal">0</span></p>
    </div>

    <script>
        let rowCount = 0;
        let colCount = 0;

        function addCol() {
            colCount++;
            let head = document.getElementById('head');
            let th = document.createElement('th');
            th.innerHTML = "Col " + colCount;
            head.appendChild(th);
            
            let rows = document.getElementById('body').rows;
            for(let r of rows) {
                let cell = r.insertCell(-1);
                cell.innerHTML = '<input type="number" class="val" oninput="updateSummary()">';
            }
        }

        function addRow() {
            rowCount++;
            let body = document.getElementById('body');
            let row = body.insertRow();
            row.insertCell(0).innerHTML = rowCount;
            
            for(let i=0; i<colCount; i++) {
                row.insertCell(-1).innerHTML = '<input type="number" class="val" oninput="updateSummary()">';
            }
            row.insertCell(-1).innerHTML = '<span class="rowTotal">0</span>';
            updateSummary();
        }

        function updateSummary() {
            let rows = document.querySelectorAll('#body tr');
            let grand = 0;
            rows.forEach(r => {
                let sum = 0;
                let inputs = r.querySelectorAll('.val');
                inputs.forEach(i => sum += Number(i.value));
                r.querySelector('.rowTotal').innerText = sum;
                grand += sum;
            });
            document.getElementById('count').innerText = rowCount;
            document.getElementById('grandTotal').innerText = grand;
        }
    </script>
</body>
</html>
