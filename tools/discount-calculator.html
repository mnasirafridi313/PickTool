<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discount Calculator - PickTool</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>

    <div class="calculator-container">
        <h1>Discount Calculator</h1>
        
        <div class="input-group">
            <label for="price">Original Price (PKR):</label>
            <input type="number" id="price" placeholder="e.g., 2000">
        </div>

        <div class="input-group">
            <label for="discount">Discount (%):</label>
            <input type="number" id="discount" placeholder="e.g., 20">
        </div>

        <button id="calculate-btn">Calculate Final Price</button>

        <div id="result" class="result-box"></div>
        
        <a href="../index.html" class="back-link">← Back to PickTool Home</a>
    </div>

    <script src="../assets/js/discount-calculator.js"></script>
</body>
</html>
